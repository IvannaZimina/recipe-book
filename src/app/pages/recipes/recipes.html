<section class="max-w-6xl mx-auto px-6 pb-10">
    <h2 class="text-2xl font-bold text-slate-900 mb-6">All Recipes</h2>

    @if (recipes$ | async; as recipes) {
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
        @for (recipe of recipes; track recipe._id) {
        <app-recipe-card [recipe]="recipe" />
        }
    </div>
    }
</section>
